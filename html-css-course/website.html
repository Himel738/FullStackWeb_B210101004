<!DOCTYPE html> <!-- ! + tab for shortcut -->
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title> <!-- Gonna Show in Tab -->
</head>

<body>

  <button> Hello </button> <!-- Create Button -->

  <p> Paragraph of Text </p> <!-- Paragraph(Extra Space Ignored in Html) -->

  <a href="https://www.youtube.com/" target="_blank"> Link to Youtube </a>
  <!-- Anker Element (which link to another website) and target open link in new tab-->

</body> <!-- Contain All the Elements that are Visible -->

</html>
